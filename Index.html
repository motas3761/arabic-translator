<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabic Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #07080f;
      --bg:         #0d0f1e;
      --surface:    rgba(255,255,255,.045);
      --surface-hi: rgba(255,255,255,.075);
      --border:     rgba(255,255,255,.08);
      --border-hi:  rgba(139,132,255,.45);
      --accent:     #7c6fff;
      --accent2:    #a78bfa;
      --accent3:    #c4b5fd;
      --text:       #eceef7;
      --text-soft:  #9496b0;
      --text-muted: #555870;
      --success:    #34d399;
      --error:      #f87171;
      --warning:    #fbbf24;
      --radius-sm:  10px;
      --radius:     18px;
      --radius-lg:  24px;
      --glow:       0 0 40px rgba(124,111,255,.18);
      --card-shadow: 0 8px 40px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.06) inset;
    }

    html { height: 100%; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(99,74,255,.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(139,92,246,.16) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 50%, #0d0f1e 0%, #07080f 100%);
    }

    /* ── Header ── */
    header {
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(7,8,15,.7);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #6d5fff 0%, #a78bfa 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 20px rgba(109,95,255,.5);
      flex-shrink: 0;
    }

    .header-titles { display: flex; flex-direction: column; gap: 1px; }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(100deg, #c4b5fd 0%, #a78bfa 40%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.02em;
    }

    .header-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .powered-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.72rem;
      color: var(--text-soft);
      letter-spacing: .02em;
    }

    .powered-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      animation: pulse-dot 2.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ── API Key Bar ── */
    .api-key-bar {
      padding: 14px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.018);
    }

    .api-key-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .api-key-wrap {
      flex: 1;
      min-width: 220px;
      max-width: 480px;
    }

    .api-key-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 14px;
      font-size: 0.82rem;
      font-family: 'Courier New', monospace;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
      letter-spacing: .04em;
    }
    .api-key-input::placeholder { color: var(--text-muted); }
    .api-key-input:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(124,111,255,.12);
    }

    .security-note {
      font-size: 0.72rem;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: .75;
    }

    /* ── Controls ── */
    .controls-bar {
      padding: 12px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .lang-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-right: 4px;
    }

    .lang-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: all .2s;
      letter-spacing: .01em;
    }
    .lang-btn:hover {
      border-color: rgba(124,111,255,.4);
      color: var(--text);
      background: rgba(124,111,255,.08);
    }
    .lang-btn.active {
      background: linear-gradient(135deg, #6d5fff, #a78bfa);
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 14px rgba(109,95,255,.4);
    }

    .action-btns { display: flex; gap: 8px; }

    .btn {
      padding: 7px 15px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .18s;
    }
    .btn:hover { background: var(--surface-hi); color: var(--text); border-color: rgba(255,255,255,.14); }
    .btn:active { transform: scale(.96); }
    .btn.copy-btn.copied {
      background: rgba(52,211,153,.15);
      border-color: rgba(52,211,153,.4);
      color: var(--success);
    }
    .btn.clear-btn:hover {
      background: rgba(248,113,113,.1);
      border-color: rgba(248,113,113,.35);
      color: var(--error);
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 28px 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .translator-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
    }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      min-height: 380px;
      transition: border-color .25s, box-shadow .25s;
      backdrop-filter: blur(8px);
    }
    .panel:focus-within {
      border-color: rgba(124,111,255,.28);
      box-shadow: var(--card-shadow), var(--glow);
    }

    .panel-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.025);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title .flag { font-size: 1.05rem; }

    .panel-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .char-count {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 20px 22px;
      font-size: 1.15rem;
      color: var(--text);
      line-height: 1.75;
      font-family: 'Inter', 'Noto Sans Arabic', 'Arial', sans-serif;
      min-height: 300px;
    }

    #input-area { direction: rtl; text-align: right; }
    #input-area::placeholder { direction: rtl; color: var(--text-muted); }
    #output-area { cursor: default; user-select: text; }
    #output-area::placeholder { color: var(--text-muted); }

    .output-panel {
      border-color: rgba(124,111,255,.14);
    }
    .output-panel .panel-header {
      background: linear-gradient(90deg, rgba(109,95,255,.1) 0%, rgba(255,255,255,.025) 100%);
    }

    /* ── Status bar ── */
    .status-bar {
      height: 40px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 500;
      transition: color .2s;
      flex-shrink: 0;
    }

    .status-idle    { color: var(--text-muted); }
    .status-loading { color: var(--accent2); }
    .status-success { color: var(--success); }
    .status-error   { color: var(--error); }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(167,139,250,.2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .status-loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: none;
      flex-shrink: 0;
    }
    .status-success .status-dot { display: block; background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-error   .status-dot { display: block; background: var(--error);   box-shadow: 0 0 6px var(--error); }

    /* ── Mic button ── */
    .mic-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
      padding: 0;
      position: relative;
    }
    .mic-btn:hover {
      border-color: rgba(124,111,255,.5);
      color: var(--accent3);
      background: rgba(109,95,255,.12);
      box-shadow: 0 0 16px rgba(109,95,255,.25);
    }
    .mic-btn.recording {
      border-color: rgba(248,113,113,.6);
      color: var(--error);
      background: rgba(248,113,113,.12);
      animation: mic-pulse 1.4s ease-in-out infinite;
    }
    .mic-btn.unsupported { opacity: .3; cursor: not-allowed; pointer-events: none; }

    @keyframes mic-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(248,113,113,.5), 0 0 0 0   rgba(248,113,113,.25); }
      50%  { box-shadow: 0 0 0 8px rgba(248,113,113,0),  0 0 0 16px rgba(248,113,113,0); }
      100% { box-shadow: 0 0 0 0   rgba(248,113,113,.5), 0 0 0 0   rgba(248,113,113,.25); }
    }

    /* Recording badge */
    .recording-badge {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.73rem;
      color: var(--error);
      font-weight: 500;
    }
    .recording-badge.visible { display: flex; }

    .rec-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--error);
      box-shadow: 0 0 6px var(--error);
      animation: rec-blink 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes rec-blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── Error box ── */
    .error-box {
      display: none;
      margin: 0 40px 20px;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.22);
      border-radius: var(--radius-sm);
      padding: 13px 18px;
      font-size: 0.83rem;
      color: #fca5a5;
      line-height: 1.55;
      animation: slideDown .2s ease;
    }
    .error-box.visible { display: flex; gap: 10px; align-items: flex-start; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      header, .api-key-bar, .controls-bar { padding: 14px 20px; }
      main { padding: 16px 20px 28px; }
      .translator-grid { grid-template-columns: 1fr; }
      .error-box { margin: 0 20px 16px; }
      textarea { font-size: 1.05rem; padding: 16px 18px; }
    }

    /* ── Scrollbar ── */
    textarea::-webkit-scrollbar { width: 5px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 99px; }
    textarea::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="logo">🌐</div>
    <div class="header-titles">
      <h1>Arabic Translator</h1>
      <span class="header-sub">Real-time voice &amp; text</span>
    </div>
  </div>
  <div class="powered-badge">Powered by Claude AI</div>
</header>

<!-- ── API Key ── -->
<div class="api-key-bar">
  <span class="api-key-label">API Key</span>
  <div class="api-key-wrap">
    <input
      id="api-key"
      class="api-key-input"
      type="password"
      placeholder="sk-ant-..."
      autocomplete="off"
      spellcheck="false"
    />
  </div>
  <span class="security-note">⚠ Saved to localStorage only</span>
</div>

<!-- ── Controls ── -->
<div class="controls-bar">
  <div class="lang-selector">
    <span class="lang-label">Translate to</span>
    <button class="lang-btn" id="btn-he" onclick="setLang('he')">🇮🇱 Hebrew</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇺🇸 English</button>
  </div>
  <div class="action-btns">
    <button class="btn copy-btn" id="copy-btn" onclick="copyOutput()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy
    </button>
    <button class="btn clear-btn" onclick="clearAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Clear
    </button>
  </div>
</div>

<!-- ── Error box ── -->
<div class="error-box" id="error-box">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <span id="error-text"></span>
</div>

<main>
  <div class="translator-grid">

    <!-- Input panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="flag">🇸🇦</span> Arabic Input
        </div>
        <div class="panel-header-right">
          <span class="char-count" id="char-count">0 chars</span>
          <button class="mic-btn" id="mic-btn" title="Record Arabic speech" onclick="toggleRecording()">
            <svg id="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <textarea
        id="input-area"
        placeholder="اكتب النص العربي هنا..."
        lang="ar"
        dir="rtl"
        spellcheck="false"
      ></textarea>
      <div class="status-bar status-idle" id="input-status">
        <div class="recording-badge" id="recording-badge">
          <div class="rec-dot"></div>
          <span id="recording-text">Recording...</span>
        </div>
        <span id="input-status-text">Ready</span>
      </div>
    </div>

    <!-- Output panel -->
    <div class="panel output-panel">
      <div class="panel-header">
        <div class="panel-title" id="output-title">
          <span class="flag" id="output-flag">🇮🇱</span>
          <span id="output-lang-label">Hebrew Translation</span>
        </div>
      </div>
      <textarea
        id="output-area"
        placeholder="Translation will appear here..."
        readonly
        dir="rtl"
        lang="he"
      ></textarea>
      <div class="status-bar status-idle" id="output-status">
        <div class="spinner"></div>
        <div class="status-dot"></div>
        <span id="status-text">Waiting for input...</span>
      </div>
    </div>

  </div>
</main>

<script>
  // ── State ──
  let targetLang = 'he';
  let abortController = null;

  // ── Language config ──
  const LANGS = {
    he: { flag: '🇮🇱', label: 'Hebrew Translation', dir: 'rtl', lang: 'he', name: 'Hebrew' },
    en: { flag: '🇺🇸', label: 'English Translation', dir: 'ltr', lang: 'en', name: 'English' },
  };

  // ── DOM refs ──
  const inputEl      = document.getElementById('input-area');
  const outputEl     = document.getElementById('output-area');
  const charCount    = document.getElementById('char-count');
  const outputFlag   = document.getElementById('output-flag');
  const outputLabel  = document.getElementById('output-lang-label');
  const statusEl     = document.getElementById('output-status');
  const statusText   = document.getElementById('status-text');
  const errorBox     = document.getElementById('error-box');
  const errorText    = document.getElementById('error-text');
  const apiKeyInput  = document.getElementById('api-key');
  const copyBtn      = document.getElementById('copy-btn');

  // ── API key persistence ──
  const STORAGE_KEY = 'arabic_translator_api_key';
  apiKeyInput.value = localStorage.getItem(STORAGE_KEY) || '';
  apiKeyInput.addEventListener('input', () => {
    const val = apiKeyInput.value.trim();
    if (val) localStorage.setItem(STORAGE_KEY, val);
    else localStorage.removeItem(STORAGE_KEY);
  });

  // ── Init ──
  setLang('he');

  // ── Lang selector ──
  function setLang(lang) {
    targetLang = lang;
    const cfg = LANGS[lang];
    outputFlag.textContent   = cfg.flag;
    outputLabel.textContent  = cfg.label;
    outputEl.setAttribute('dir', cfg.dir);
    outputEl.setAttribute('lang', cfg.lang);
    outputEl.style.textAlign = cfg.dir === 'rtl' ? 'right' : 'left';

    document.getElementById('btn-he').classList.toggle('active', lang === 'he');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');

    // Re-translate if there's content (manual typing mode)
    if (inputEl.value.trim()) translateSegment(inputEl.value.trim());
  }

  // ── Input handler (manual typing only — not used during recording) ──
  inputEl.addEventListener('input', () => {
    const len = inputEl.value.length;
    charCount.textContent = `${len} char${len !== 1 ? 's' : ''}`;
    if (!inputEl.value.trim()) {
      setStatus('idle', 'Waiting for input...');
      hideError();
    }
  });

  // ── Translation (streaming, appends one line to output) ──
  async function translateSegment(text) {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { showError('Please enter your Anthropic API key above.'); return; }
    if (!text) return;

    // Cancel any in-flight request before starting a new one
    if (abortController) abortController.abort();
    abortController = new AbortController();

    setStatus('loading', 'Translating...');
    hideError();

    // Start a new line in the output for this segment
    if (outputEl.value && !outputEl.value.endsWith('\n')) outputEl.value += '\n';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        signal: abortController.signal,
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          stream: true,
          system: `You are a professional Arabic translator. Translate the user's Arabic text to ${LANGS[targetLang].name}. Return ONLY the translated text — no explanations, no notes, no labels.`,
          messages: [{ role: 'user', content: text }]
        }),
      });

      if (!response.ok) {
        let errMsg = `API error ${response.status}`;
        try {
          const errBody = await response.json();
          errMsg = errBody?.error?.message || errMsg;
          if (response.status === 401) errMsg = 'Invalid API key. Check that your key starts with "sk-ant-".';
          if (response.status === 429) errMsg = 'Rate limit reached. Please wait a moment and try again.';
          if (response.status === 403) errMsg = 'Access denied. Your API key may not have permission.';
        } catch (_) {}
        throw new Error(errMsg);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const evt = JSON.parse(data);
            if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
              outputEl.value += evt.delta.text;
              outputEl.scrollTop = outputEl.scrollHeight;
            }
          } catch (_) {}
        }
      }

      setStatus('success', `Translated to ${LANGS[targetLang].name}`);

    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error('Translation error:', err);
      showError(err.message || 'Translation failed. Check your connection and API key.');
      setStatus('error', 'Translation failed');
    }
  }

  // ── Status helpers ──
  function setStatus(type, msg) {
    statusEl.className = `status-bar status-${type}`;
    statusText.textContent = msg;
  }

  function showError(msg) {
    errorBox.classList.add('visible');
    errorText.textContent = msg;
  }

  function hideError() {
    errorBox.classList.remove('visible');
  }

  // ── Copy button ──
  async function copyOutput() {
    const text = outputEl.value;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 2000);
    } catch (_) {
      outputEl.select();
      document.execCommand('copy');
    }
  }

  // ── Clear button ──
  function clearAll() {
    inputEl.value = '';
    outputEl.value = '';
    charCount.textContent = '0 chars';
    setStatus('idle', 'Waiting for input...');
    hideError();
    if (abortController) { abortController.abort(); abortController = null; }
    inputEl.focus();
  }

  // ── Keyboard shortcut: Ctrl+Enter to translate immediately ──
  inputEl.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      translateSegment(inputEl.value.trim());
    }
  });

  // ── Auto-focus input ──
  inputEl.focus();

  // ── Speech Recognition ──
  const SpeechRecognitionAPI = window.webkitSpeechRecognition || window.SpeechRecognition;
  const micBtn          = document.getElementById('mic-btn');
  const micIcon         = document.getElementById('mic-icon');
  const recordingBadge  = document.getElementById('recording-badge');
  const recordingText   = document.getElementById('recording-text');
  const inputStatusText = document.getElementById('input-status-text');

  const MIC_SVG  = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>`;
  const STOP_SVG = `<rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"/>`;

  let recognition = null;
  let isRecording = false;
  let userStopped = false;

  if (!SpeechRecognitionAPI) {
    micBtn.classList.add('unsupported');
    micBtn.title = 'Speech recognition is not supported in this browser. Try Chrome or Edge.';
  }

  function buildRecognition() {
    const r = new SpeechRecognitionAPI();
    r.lang            = 'ar-SA';
    r.continuous      = true;
    r.interimResults  = true;
    r.maxAlternatives = 1;

    r.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micIcon.innerHTML = STOP_SVG;
      recordingBadge.classList.add('visible');
      inputStatusText.style.display = 'none';
      recordingText.textContent = 'Recording...';
      hideError();
    };

    r.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const transcript = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal) {
          inputEl.value = '';
          charCount.textContent = '0 chars';
          recordingText.textContent = 'Recording...';
          translateSegment(transcript);
        } else {
          inputEl.value = transcript;
          charCount.textContent = `${transcript.length} chars`;
          recordingText.textContent = `"${transcript.slice(0, 36)}${transcript.length > 36 ? '…' : ''}"`;
        }
      }
    };

    r.onerror = (e) => {
      const msgs = {
        'not-allowed':         'Microphone access was denied. Please allow microphone permissions and try again.',
        'audio-capture':       'No microphone found. Please connect a microphone and try again.',
        'network':             'Network error during speech recognition. Check your connection.',
        'service-not-allowed': 'Speech service not allowed. Make sure the page is served over HTTPS or localhost.',
        'no-speech':           null,
        'aborted':             null,
      };
      const msg = msgs[e.error];
      if (msg) { showError(msg); userStopped = true; stopRecordingUI(); }
    };

    r.onend = () => {
      if (isRecording && !userStopped) {
        try { recognition.start(); } catch (_) {}
      } else {
        stopRecordingUI();
      }
    };

    return r;
  }

  function toggleRecording() {
    if (!SpeechRecognitionAPI) {
      showError('Speech recognition is not supported in this browser. Please use Chrome or Edge.');
      return;
    }
    if (isRecording) {
      userStopped = true;
      recognition.stop();
    } else {
      userStopped = false;
      recognition = buildRecognition();
      try {
        recognition.start();
      } catch (err) {
        stopRecordingUI();
        showError('Could not start the microphone. Please try again.');
      }
    }
  }

  function stopRecordingUI() {
    isRecording = false;
    micBtn.classList.remove('recording');
    micIcon.innerHTML = MIC_SVG;
    recordingBadge.classList.remove('visible');
    inputStatusText.style.display = '';
    inputStatusText.textContent = 'Ready';
  }
</script>
</body>
</html>
